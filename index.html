<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ElectroShop</title>
  <style>
    body { font-family: Arial; margin:0; }
    header { background:#111; color:white; padding:15px; display:flex; justify-content:space-between; }
    nav a { color:white; margin:0 10px; text-decoration:none; }
    .container { padding:20px; }
    .products { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; }
    .card { border:1px solid #ccc; padding:15px; border-radius:10px; }
    button { background:#007bff; color:white; border:none; padding:10px; cursor:pointer; }
    #cart { position:fixed; right:0; top:0; width:250px; background:#f4f4f4; height:100%; padding:15px; overflow:auto; }
  </style>
</head>
<body>

<header>
  <h2>ElectroShop</h2>
  <nav>
    <a href="#home">Home</a>
    <a href="#products">Products</a>
    <a href="#about">About</a>
  </nav>
</header>

<div class="container" id="home">
  <h1>Welcome to ElectroShop</h1>
  <p>Your one-stop shop for electronics.</p>
</div>

<div class="container" id="products">
  <h2>Products</h2>
  <div class="products" id="product-list"></div>
</div>

<div class="container" id="about">
  <h2>About Us</h2>
  <p>We provide quality electronic devices at affordable prices.</p>
</div>

<div id="cart">
  <h3>Cart</h3>
  <ul id="cart-items"></ul>
  <button onclick="checkout()">Checkout</button>
</div>

<script>
  const products = [
    {name:"Laptop", price:800},
    {name:"Smartphone", price:600},
    {name:"Headphones", price:150},
    {name:"Smartwatch", price:200},
    {name:"Tablet", price:300}
  ];

  let cart = [];

  function displayProducts(){
    const list = document.getElementById("product-list");
    products.forEach((p,i)=>{
      list.innerHTML += `<div class="card">
        <h3>${p.name}</h3>
        <p>$${p.price}</p>
        <button onclick="addToCart(${i})">Add to Cart</button>
      </div>`;
    });
  }

  function addToCart(index){
    cart.push(products[index]);
    updateCart();
  }

  function updateCart(){
    const cartItems = document.getElementById("cart-items");
    cartItems.innerHTML = "";
    cart.forEach(item=>{
      cartItems.innerHTML += `<li>${item.name} - $${item.price}</li>`;
    });
  }

  function checkout(){
    alert("Payment simulation successful! (Stripe/PayPal test mode)");
    cart = [];
    updateCart();
  }

  displayProducts();
</script>

</body>
</html>
